database_params:
  database_type: stoch
  dtb_folder_suffix: H2_POF_2023
  dtb_file: solutions_5dt.h5
  database_name: dtb_resampled
  dt_var: true
  fuel: H2
  mech_file: ../../data/chemical_mechanisms/mech_H2.yaml
