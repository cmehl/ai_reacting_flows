mech_file: ../../data/chemical_mechanisms/mech_nh3_noArHe.yaml
pv_species:
- H2O
fuel:
- NH3
results_folder_suffix: NH3_1ATM
dtb_file: solutions.h5
pressure: 101325.0
time_step:  1.0e-6
include_zerod: True
include_oned_prem: False
include_oned_diff: False
zerod_params:
  phi_bounds:
  - 0.6
  - 1.3
  T0_bounds:
  - 1800.0
  - 2000.0
  n_samples: 200
  max_sim_time: 1.0e-2
  solve_mode: "dt_cfd"
oned_prem_params:
  phi_bounds:
    - 0.6
    - 1.3
  T0_bounds:
    - 300.0
    - 500.0
  n_samples: 3
oned_diff_params:
  strain_bounds:
    - 0.0
    - 1000.0
  T0_bounds:
    - 300.0
    - 500.0
  n_samples: 3
  width: 0.02
augment_dataset: False
# For multi dt generation
T_threshold: 600.0
time_step_type: random
time_step_range:
- 1.0e-07
- 1.0e-06
nb_dt: 5
new_file_name: solutions_5dt.h5